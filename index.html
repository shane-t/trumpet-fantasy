<!DOCTYPE html>
<html>
    <head>
        <title>the ultimate comment</title>
        <script defer src='js/loop.js'></script>
        <script defer src='js/stages/general-miaow.js'></script>
        <script defer src='js/stages/triangulon.js'></script>
        <script defer src='js/stages/the-holy-spoon.js'></script>
        <script defer src='js/stages/the-reality-fish.js'></script>
        <script defer src='js/engine/game-think.js'></script>
        <script defer src='js/engine/game-engine.js'></script>
        <script defer src='js/screens/stage-select-screen.js'></script>
        <script defer src='js/screens/stage-transition-screen.js'></script>
        <script defer src='js/screens/stage-complete-screen.js'></script>
        <script defer src='js/screens/victory-screen.js'></script>
        <script defer src='js/screens/game-over-screen.js'></script>
        <script defer src='js/rendering/gameplay-renderer.js'></script>
        <script defer src='js/rendering/game-renderer.js'></script>
        <script defer src='js/run.js'></script>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
        <style>
            body {
                background: black;
                margin: 0;
                padding: 0;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                height: 100vh;
                touch-action: none;
            }
            h1 {
                display: none;
            }
            .game-container {
                width: 100%;
                max-width: 800px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .game-area {
                border: 1px solid #fff;
                width: 100%;
                aspect-ratio: 2 / 1;
                max-width: 800px;
                max-height: 400px;
                box-sizing: border-box;
                margin-top: env(safe-area-inset-top, 10px);
            }
            
            #mobile-controls {
                display: none;
                width: 100%;
                max-width: 800px;
                padding: 20px 30px;
                box-sizing: border-box;
                justify-content: space-between;
                align-items: center;
                margin-top: 30px;
            }

            @media (max-width: 800px), (hover: none) and (pointer: coarse) {
                #mobile-controls {
                    display: flex;
                }
            }

            .d-pad {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
                gap: 5px;
            }
            
            .btn {
                background: rgba(255, 255, 255, 0.2);
                border: 3px solid rgba(255, 255, 255, 0.5);
                border-radius: 50%;
                color: rgba(255, 255, 255, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: monospace;
                font-size: 24px;
                font-weight: bold;
                user-select: none;
                -webkit-touch-callout: none;
                cursor: pointer;
            }
            
            .btn:active {
                background: rgba(255, 255, 255, 0.6);
                color: #000;
            }
            
            .btn-up { grid-column: 2; grid-row: 1; }
            .btn-left { grid-column: 1; grid-row: 2; }
            .btn-right { grid-column: 3; grid-row: 2; }
            .btn-down { grid-column: 2; grid-row: 3; }
            
            .action-buttons {
                display: flex;
                gap: 20px;
                align-items: center;
            }
            
            .btn-action {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                font-size: 32px;
                background: rgba(255, 50, 50, 0.2);
                border-color: rgba(255, 50, 50, 0.5);
            }
            .btn-action:active {
                background: rgba(255, 50, 50, 0.6);
            }

            .btn-small {
                width: 55px;
                height: 55px;
                border-radius: 50%;
                font-size: 14px;
                background: rgba(50, 200, 255, 0.2);
                border-color: rgba(50, 200, 255, 0.5);
            }
            .btn-small:active {
                background: rgba(50, 200, 255, 0.6);
            }
        </style>
    </head>
    <body>
        <h1>the ultimate comment</h1>
        <div class="game-container">
            <canvas class="game-area" width="800" height="400" id="space">
                Sorry you need to be able to display canvas elements
            </canvas>
            
            <div id="mobile-controls">
                <div class="d-pad">
                    <div class="btn btn-up" id="btn-up">W</div>
                    <div class="btn btn-left" id="btn-left">A</div>
                    <div class="btn btn-right" id="btn-right">D</div>
                    <div class="btn btn-down" id="btn-down">S</div>
                </div>
                <div class="action-buttons">
                    <div class="btn btn-small" id="btn-rainbow">RBW</div>
                    <div class="btn btn-action" id="btn-shoot">FIRE</div>
                </div>
            </div>
        </div>
        <script defer src="js/mobile-controls.js"></script>
    </body>
</html>
